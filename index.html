<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Happy Birthday ❤️</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to bottom,#ffdde1,#ee9ca7);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow-x:hidden;
}

#envelope{
    font-size:120px;
    cursor:pointer;
    text-align:center;
}

#letter{
    display:none;
    max-width:800px;
    background:white;
    padding:30px;
    border-radius:20px;
    box-shadow:0 0 20px rgba(0,0,0,0.2);
    text-align:center;
}

h1{
    color:#ff4d6d;
}

.gallery img{
    width:250px;
    max-width:90%;
    margin:10px;
    border-radius:15px;
}

p{
    line-height:1.8;
    color:#444;
}
</style>
</head>

<body>

<div id="envelope" onclick="openLetter()">
    💌
    <p style="font-size:20px;">Click to Open</p>
</div>

<div id="letter">
    <h1>Happy Birthday My Love ❤️</h1>

    <p>
        Happy Birthday to the most amazing person in my life.
    </p>

    <p>
        Thank you for all the memories, laughter, and love we've shared.
        Every day with you is special.
    </p>

    <p>
        I hope today brings you as much happiness as you've brought into my life.
    </p>

    <div class="gallery">
        <img src="photo1.jpg">
        <img src="photo2.jpg">
        <img src="photo3.jpg">
    </div>

    <h2>I Love You ❤️</h2>
</div>

<audio id="music" loop>
    <source src="music.mp3" type="audio/mpeg">
</audio>

<script>
function openLetter(){
    document.getElementById("envelope").style.display="none";
    document.getElementById("letter").style.display="block";

    document.getElementById("music").play();
}
</script>

</body>
</html>
